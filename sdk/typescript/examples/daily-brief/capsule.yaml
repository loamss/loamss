# Daily Briefing — the canonical "full loop" reference capsule.
#
# What the loop is:
#
#   sources  →  memory layer  →  this capsule  →  model.call  →  brief
#
# Concretely, when invoked, the capsule:
#
#   1. Calls threads.list to enumerate recent conversations
#   2. Calls threads.entries on each thread to walk reading order
#   3. Calls memory.show on each entry to pull content + metadata
#   4. Hands the assembled context to model.call with a brief prompt
#   5. Returns a structured summary to whoever invoked the tool
#
# This is the kind of capsule we'd ship as a canonical reference in
# the registry. It exercises every layer of the substrate.

spec_version: "0.1"

name: daily-brief
version: 0.1.0

author:
  name: Loamss contributors
  url: https://github.com/loamss/loamss

# What the capsule needs from the runtime. Flat list of requests.
permissions:
  - capability: memory.read
    rationale: |
      The brief surfaces recent threads + entities; the capsule
      needs to list and read memory entries to assemble context.
  - capability: model.call
    rationale: |
      The brief is generated by an LLM. The capsule calls model.call
      with the assembled context and returns the model's text.

# Tools the capsule exposes to MCP clients.
tools:
  - name: brief
    description: "Generate today's brief from recent memory."
    input_schema:
      type: object
      properties:
        namespace:
          type: string
          description: Memory namespace to brief on. Defaults to all.
        thread_limit:
          type: integer
          minimum: 1
          maximum: 20
          description: How many recent threads to consider. Default 5.
        entries_per_thread:
          type: integer
          minimum: 1
          maximum: 50
          description: How many entries per thread to include. Default 5.
        model_id:
          type: string
          description: Optional override for the model to use.
      additionalProperties: false

# What kind of model the capsule needs. Phase 2 router will match
# this; for v0.1 the dispatcher picks the first "text"-capable
# adapter from the configured set.
model_requirements:
  capabilities: ["text"]
  preferred_quality: balanced

# Subprocess runtime. The runtime spawns this command and pipes
# MCP-over-stdio. See capsule-spec.md §runtime for the contract.
runtime:
  type: subprocess
  entrypoint: ["bun", "run", "dist/index.js"]
  protocol: mcp

description: "Generate a daily brief from recent memory."
tags: [reference, example]
license: Apache-2.0
