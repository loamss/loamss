name: Release

# Builds release binaries for macOS (arm64, amd64) and Linux
# (arm64, amd64) and attaches them to a GitHub Release. Triggers on
# any tag matching v* (e.g. v0.1.0, v1.0.0-rc1).
#
# Architecture: one job builds the console (Next.js static export)
# once, since the output is platform-independent. A matrix job then
# cross-compiles the Go binary for every target, embedding the same
# console bundle into each. This is simpler than running bun on
# every matrix node and keeps the dist/ embed deterministic across
# architectures.
#
# Security note: every shell `run:` step uses runner-set env vars
# (GITHUB_REF, GITHUB_SHA) or git commands, never user-controlled
# event payload fields. Any future change that needs github.event
# data should be passed via the env: block, not interpolated into
# run: directly.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # required for softprops/action-gh-release to create a Release

jobs:
  build-console:
    name: build console bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build console
        working-directory: console
        run: |
          bun install --frozen-lockfile
          bun run build

      # Upload the static export so the per-target build jobs can
      # embed it. Going through an artifact (vs. each job re-running
      # bun) guarantees byte-for-byte identical embeds across the
      # release matrix.
      - name: Upload console bundle
        uses: actions/upload-artifact@v4
        with:
          name: console-out
          path: console/out/
          retention-days: 1

  build-binaries:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: build-console
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: runtime/go.sum

      - name: Restore console bundle
        uses: actions/download-artifact@v4
        with:
          name: console-out
          path: runtime/internal/console/dist

      - name: Build binary
        working-directory: runtime
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          # GITHUB_REF is set by the runner from the actual git ref
          # (refs/tags/vX.Y.Z); GITHUB_SHA is the commit SHA. Both
          # are runner-set, not from user input.
          VERSION="${GITHUB_REF#refs/tags/}"
          COMMIT="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          OUT="loamss-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p ../dist
          # Re-create the .gitkeep marker the Makefile would leave;
          # not strictly needed for the build, just hygiene.
          touch internal/console/dist/.gitkeep
          go build \
            -trimpath \
            -ldflags "-s -w \
              -X github.com/loamss/loamss/runtime/internal/cli.version=${VERSION} \
              -X github.com/loamss/loamss/runtime/internal/cli.commit=${COMMIT} \
              -X github.com/loamss/loamss/runtime/internal/cli.buildDate=${BUILD_DATE}" \
            -o "../dist/${OUT}/loamss" \
            ./cmd/loamss
          # Package the binary alongside its license + a short README
          # so the tarball is self-explanatory.
          cp ../LICENSE "../dist/${OUT}/"
          cp ../README.md "../dist/${OUT}/"
          cd ../dist
          tar -czf "${OUT}.tar.gz" "${OUT}/"
          # Checksum for verification by the user.
          shasum -a 256 "${OUT}.tar.gz" > "${OUT}.tar.gz.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: loamss-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/loamss-*-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            dist/loamss-*-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
          retention-days: 7

  release:
    name: publish release
    needs: build-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: loamss-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generate release notes from commit messages between
          # the previous tag and this one. We can override later by
          # writing CHANGELOG.md entries.
          generate_release_notes: true
          files: |
            dist/loamss-*.tar.gz
            dist/loamss-*.tar.gz.sha256
          # Mark prerelease for any tag containing a hyphen (v0.1.0-rc1, etc.)
          prerelease: ${{ contains(github.ref_name, '-') }}

  update-homebrew-tap:
    # Mirrors the canonical formula (homebrew/Formula/loamss.rb) into
    # the companion tap repo at loamss/homebrew-loamss with the new
    # version + SHA256s for this tag. Needs a HOMEBREW_TAP_TOKEN
    # secret — a GitHub PAT with contents:write on the tap repo.
    # When the secret is absent the job logs a warning + skips so
    # release pipelines work before the tap is set up.
    name: update homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v6

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: loamss-*
          merge-multiple: true

      - name: Skip if tap token unset
        id: precheck
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN secret is unset; skipping tap update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute SHAs and rewrite formula
        if: steps.precheck.outputs.skip != 'true'
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION_TAG#v}"
          DARWIN_ARM64=$(shasum -a 256 "dist/loamss-${VERSION_TAG}-darwin-arm64.tar.gz" | awk '{print $1}')
          DARWIN_AMD64=$(shasum -a 256 "dist/loamss-${VERSION_TAG}-darwin-amd64.tar.gz" | awk '{print $1}')
          LINUX_ARM64=$(shasum -a 256 "dist/loamss-${VERSION_TAG}-linux-arm64.tar.gz" | awk '{print $1}')
          LINUX_AMD64=$(shasum -a 256 "dist/loamss-${VERSION_TAG}-linux-amd64.tar.gz" | awk '{print $1}')

          python3 - <<PYEOF
          import re
          path = "homebrew/Formula/loamss.rb"
          with open(path) as f:
              text = f.read()
          # Bump the version line.
          text = re.sub(r'version "[^"]+"', f'version "${VERSION}"', text, count=1)
          # Replace SHAs in the order they appear: darwin-arm64,
          # darwin-amd64, linux-arm64, linux-amd64.
          shas = [
              "${DARWIN_ARM64}",
              "${DARWIN_AMD64}",
              "${LINUX_ARM64}",
              "${LINUX_AMD64}",
          ]
          parts = re.split(r'(sha256 "[0-9a-f]{64}")', text)
          out = []
          sha_idx = 0
          for p in parts:
              if p.startswith('sha256 "') and sha_idx < len(shas):
                  out.append(f'sha256 "{shas[sha_idx]}"')
                  sha_idx += 1
              else:
                  out.append(p)
          with open(path, "w") as f:
              f.write("".join(out))
          print(f"Rewrote {path} for version {VERSION}")
          PYEOF

      - name: Push to tap repo
        if: steps.precheck.outputs.skip != 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config --global user.name "loamss-release-bot"
          git config --global user.email "release-bot@loamss.com"
          # The tap repo lives at github.com/loamss/homebrew-loamss
          # and has a Formula/ directory at its root.
          TAP_DIR=$(mktemp -d)
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/loamss/homebrew-loamss.git" \
            "${TAP_DIR}"
          mkdir -p "${TAP_DIR}/Formula"
          cp homebrew/Formula/loamss.rb "${TAP_DIR}/Formula/loamss.rb"
          cd "${TAP_DIR}"
          if git diff --quiet; then
            echo "Tap formula already up to date for ${VERSION_TAG}; nothing to push."
            exit 0
          fi
          git add Formula/loamss.rb
          git commit -m "loamss ${VERSION_TAG}"
          git push origin HEAD

  publish-sdk-npm:
    # Publishes @loamss/sdk to npm on every stable release tag (no
    # prerelease suffix). Requires an NPM_TOKEN secret with publish
    # rights on the @loamss org. When the secret is unset the job
    # logs a warning + skips so release pipelines work before npm
    # publishing is set up.
    name: publish @loamss/sdk to npm
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    permissions:
      contents: read  # to checkout the repo
      id-token: write # required by `npm publish --provenance` so npm can
                      # cross-check the publish came from this workflow
                      # run via GitHub's OIDC token; published package
                      # carries a verifiable "built by GH Actions" claim.
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node (for npm publish)
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Skip if npm token unset
        id: precheck
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN secret is unset; skipping npm publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync package version with tag
        if: steps.precheck.outputs.skip != 'true'
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION_TAG#v}"
          # Pin the published version to the git tag. We use `npm
          # version` rather than editing the JSON directly so npm's
          # own validation runs.
          npm version --no-git-tag-version "$VERSION"

      - name: Install + test + build
        if: steps.precheck.outputs.skip != 'true'
        run: |
          # `bun run build` runs `tsc --project tsconfig.build.json`
          # which type-checks src/ as part of compilation. We don't
          # ALSO run the workspace-wide `bun run typecheck` here
          # because that includes examples/ — a broken example
          # shouldn't block the SDK publish.
          bun install --frozen-lockfile
          bun run test
          bun run build

      - name: Publish to npm
        if: steps.precheck.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public --provenance
